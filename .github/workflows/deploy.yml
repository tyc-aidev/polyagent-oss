name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  migrate:
    name: Database migrate + seed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database (idempotent)
        run: pnpm db:setup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy Worker
        run: pnpm --filter @polyagent/web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: ${{ secrets.DATABASE_URL }}

  verify:
    name: Post-deploy verification
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Polymarket Gamma API
        run: pnpm verify:gamma

      - name: Cloudflare smoke test
        run: pnpm smoke:cloudflare
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}