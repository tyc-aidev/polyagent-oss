name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  integration:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Polymarket Gamma API (live)
        run: pnpm verify:gamma

  smoke:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: polyagent
          POSTGRES_PASSWORD: polyagent
          POSTGRES_DB: polyagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polyagent -d polyagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup database (idempotent migrate + seed)
        run: pnpm db:setup
        env:
          DATABASE_URL: postgresql://polyagent:polyagent@localhost:5432/polyagent

      - name: Re-run database setup (idempotency check)
        run: pnpm db:setup
        env:
          DATABASE_URL: postgresql://polyagent:polyagent@localhost:5432/polyagent

      - name: Build web app
        run: pnpm --filter @polyagent/web build
        env:
          DATABASE_URL: postgresql://polyagent:polyagent@localhost:5432/polyagent

      - name: Start server and run smoke test
        run: |
          pnpm --filter @polyagent/web start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done
          pnpm smoke
        env:
          DATABASE_URL: postgresql://polyagent:polyagent@localhost:5432/polyagent
          SCHEDULER_MODE: docker
          SMOKE_BASE_URL: http://localhost:3000
          CRON_SECRET: ci-smoke-test-secret