services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polyagent
      POSTGRES_PASSWORD: polyagent
      POSTGRES_DB: polyagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyagent -d polyagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://polyagent:polyagent@postgres:5432/polyagent
      GAMMA_API_BASE: https://gamma-api.polymarket.com
      MARKET_CACHE_TTL_SECONDS: 60
      SCHEDULER_MODE: docker
      # CRON_SECRET: optional; required to call /api/internal/* in production NODE_ENV
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata: